# Cloudflare Pages 자동 배포 설정

name = "timeoffclub"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Pages 빌드 설정 (GitHub 연동 자동 배포용)
[build]
command = "npm run build && npx @cloudflare/next-on-pages"

# Pages 빌드 결과 디렉토리
pages_build_output_dir = ".vercel/output/static"

# 네이버 커머스 프록시 URL (공개 값 — secret은 대시보드에 별도 등록)
# NAVER_MEMBERSHIP_PRODUCT_IDS: 멤버십 상품 ID 콤마 구분 (예: "13132932761,XXXXXXXX")
[vars]
NAVER_PROXY_URL = "https://timeoff-naver-proxy.fly.dev"
NAVER_MEMBERSHIP_PRODUCT_IDS = "13132932761"

[env.production.vars]
NAVER_PROXY_URL = "https://timeoff-naver-proxy.fly.dev"
NAVER_MEMBERSHIP_PRODUCT_IDS = "13132932761"

[env.preview.vars]
NAVER_PROXY_URL = "https://timeoff-naver-proxy.fly.dev"
NAVER_MEMBERSHIP_PRODUCT_IDS = "13132932761"

# D1 데이터베이스 바인딩 (로컬 dev용)
[[d1_databases]]
binding = "DB"
database_name = "timeoffclub-db"
database_id = "2f2b43cb-935d-4b01-89dd-a609eb0de7fc"

# D1 데이터베이스 바인딩 (배포용)
[[env.production.d1_databases]]
binding = "DB"
database_name = "timeoffclub-db"
database_id = "2f2b43cb-935d-4b01-89dd-a609eb0de7fc"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "timeoffclub-db"
database_id = "2f2b43cb-935d-4b01-89dd-a609eb0de7fc"
