# Cloudflare Pages 자동 배포 설정

name = "timeoffclub"
compatibility_date = "2024-01-01"

# Pages 빌드 설정
[build]
command = "npm run build && npx @cloudflare/next-on-pages"
cwd = ""

# Pages 빌드 결과 디렉토리
pages_build_output_dir = ".vercel/output/static"

# 환경 변수 (필요시)
[env.production]

# 브랜치별 설정
[env.production.vars]

# D1 데이터베이스 바인딩
[[env.production.d1_databases]]
binding = "DB"
database_name = "timeoffclub-db" 
database_id = "2f2b43cb-935d-4b01-89dd-a609eb0de7fc"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "timeoffclub-db"
database_id = "2f2b43cb-935d-4b01-89dd-a609eb0de7fc"